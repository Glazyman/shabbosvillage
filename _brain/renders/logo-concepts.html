<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shabbos Village — Logo Concepts</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1e1e1e;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px;
    gap: 72px;
    font-family: Georgia, serif;
  }
  .concept {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
  }
  .label {
    font-family: system-ui, sans-serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }
  .divider {
    width: 320px;
    height: 1px;
    background: rgba(255,255,255,0.07);
  }
  h1 {
    font-family: system-ui, sans-serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(212,168,83,0.6);
    text-align: center;
  }
</style>
</head>
<body>

<h1>Shabbos Village — Logo Concepts</h1>

<!-- ═══════════════════════════════════════════════ -->
<!-- CONCEPT A: STRING LIGHTS                        -->
<!-- ═══════════════════════════════════════════════ -->
<div class="concept">
  <span class="label">Concept A — String Lights</span>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 290" width="500" height="290">
    <defs>
      <filter id="glow-a">
        <feGaussianBlur stdDeviation="5" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="glow-center">
        <feGaussianBlur stdDeviation="8" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- Background -->
    <rect width="500" height="290" rx="14" fill="#1a2a0f"/>

    <!-- LEFT TREE -->
    <polygon points="65,16 43,68 87,68"   fill="#0f1c08"/>
    <polygon points="65,44 38,105 92,105"  fill="#112008"/>
    <polygon points="65,74 30,155 100,155" fill="#0e1d07"/>
    <rect x="61" y="153" width="8" height="137" fill="#0c1906"/>

    <!-- RIGHT TREE -->
    <polygon points="435,16 413,68 457,68"   fill="#0f1c08"/>
    <polygon points="435,44 408,105 462,105"  fill="#112008"/>
    <polygon points="435,74 400,155 470,155" fill="#0e1d07"/>
    <rect x="431" y="153" width="8" height="137" fill="#0c1906"/>

    <!-- STRING WIRE: M 103 68 Q 250 148 397 68 -->
    <path d="M 103 68 Q 250 148 397 68" stroke="#4a3a18" stroke-width="1.3" fill="none" opacity="0.9"/>

    <!--
      Bezier positions P0=(103,68) P1=(250,148) P2=(397,68)
      t=0.1 → (132, 82)   t=0.2 → (161, 93)   t=0.3 → (190, 101)
      t=0.4 → (219, 106)  t=0.5 → (250, 108)   t=0.6 → (281, 106)
      t=0.7 → (310, 101)  t=0.8 → (339, 93)   t=0.9 → (368, 82)
    -->

    <!-- Bulb caps -->
    <rect x="130" y="77" width="4" height="4" rx="1" fill="#3a2a10"/>
    <rect x="159" y="88" width="4" height="4" rx="1" fill="#3a2a10"/>
    <rect x="188" y="96" width="4" height="4" rx="1" fill="#3a2a10"/>
    <rect x="217" y="101" width="4" height="4" rx="1" fill="#3a2a10"/>
    <rect x="247" y="103" width="5" height="5" rx="1" fill="#3a2a10"/>
    <rect x="279" y="101" width="4" height="4" rx="1" fill="#3a2a10"/>
    <rect x="308" y="96" width="4" height="4" rx="1" fill="#3a2a10"/>
    <rect x="337" y="88" width="4" height="4" rx="1" fill="#3a2a10"/>
    <rect x="366" y="77" width="4" height="4" rx="1" fill="#3a2a10"/>

    <!-- Bulb warm glow halos -->
    <circle cx="132" cy="85" r="8"  fill="#D4A853" opacity="0.12" filter="url(#glow-a)"/>
    <circle cx="161" cy="96" r="8"  fill="#D4A853" opacity="0.12" filter="url(#glow-a)"/>
    <circle cx="190" cy="104" r="8" fill="#D4A853" opacity="0.12" filter="url(#glow-a)"/>
    <circle cx="219" cy="109" r="8" fill="#D4A853" opacity="0.12" filter="url(#glow-a)"/>
    <circle cx="250" cy="111" r="12" fill="#D4A853" opacity="0.18" filter="url(#glow-center)"/>
    <circle cx="281" cy="109" r="8" fill="#D4A853" opacity="0.12" filter="url(#glow-a)"/>
    <circle cx="310" cy="104" r="8" fill="#D4A853" opacity="0.12" filter="url(#glow-a)"/>
    <circle cx="339" cy="96" r="8"  fill="#D4A853" opacity="0.12" filter="url(#glow-a)"/>
    <circle cx="368" cy="85" r="8"  fill="#D4A853" opacity="0.12" filter="url(#glow-a)"/>

    <!-- Bulbs -->
    <circle cx="132" cy="85" r="3.5" fill="#D4A853"/>
    <circle cx="161" cy="96" r="3.5" fill="#D4A853"/>
    <circle cx="190" cy="104" r="3.5" fill="#D4A853"/>
    <circle cx="219" cy="109" r="3.5" fill="#D4A853"/>
    <circle cx="250" cy="111" r="5.5" fill="#D4A853"/>
    <circle cx="281" cy="109" r="3.5" fill="#D4A853"/>
    <circle cx="310" cy="104" r="3.5" fill="#D4A853"/>
    <circle cx="339" cy="96" r="3.5" fill="#D4A853"/>
    <circle cx="368" cy="85" r="3.5" fill="#D4A853"/>

    <!-- Bulb bright centers -->
    <circle cx="132" cy="85" r="1.4" fill="#FFF9E8"/>
    <circle cx="161" cy="96" r="1.4" fill="#FFF9E8"/>
    <circle cx="190" cy="104" r="1.4" fill="#FFF9E8"/>
    <circle cx="219" cy="109" r="1.4" fill="#FFF9E8"/>
    <circle cx="250" cy="111" r="2.2" fill="#FFF9E8"/>
    <circle cx="281" cy="109" r="1.4" fill="#FFF9E8"/>
    <circle cx="310" cy="104" r="1.4" fill="#FFF9E8"/>
    <circle cx="339" cy="96" r="1.4" fill="#FFF9E8"/>
    <circle cx="368" cy="85" r="1.4" fill="#FFF9E8"/>

    <!-- Decorative divider -->
    <line x1="188" y1="174" x2="312" y2="174" stroke="#D4A853" stroke-width="0.5" opacity="0.3"/>
    <circle cx="250" cy="174" r="2" fill="#D4A853" opacity="0.45"/>

    <!-- Text -->
    <text x="250" y="210"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="33" font-weight="700" letter-spacing="7"
      fill="#FDFAF5">SHABBOS</text>

    <text x="250" y="248"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="13" font-weight="400" letter-spacing="11"
      fill="rgba(253,250,245,0.5)">VILLAGE</text>

  </svg>
</div>

<div class="divider"></div>

<!-- ═══════════════════════════════════════════════ -->
<!-- CONCEPT B: PATH THROUGH TREES                  -->
<!-- ═══════════════════════════════════════════════ -->
<div class="concept">
  <span class="label">Concept B — Path Through Trees</span>
  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 430" width="340" height="430">
    <defs>
      <radialGradient id="horizglow" cx="50%" cy="80%" r="40%">
        <stop offset="0%" stop-color="#D4A853" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#D4A853" stop-opacity="0"/>
      </radialGradient>
    </defs>

    <!-- Background -->
    <rect width="340" height="430" rx="14" fill="#1a2a0f"/>

    <!-- LEFT TREE (5 tiers) -->
    <polygon points="58,14 38,56 78,56"     fill="#0f1c08"/>
    <polygon points="58,40 32,90 84,90"      fill="#112008"/>
    <polygon points="58,66 25,124 91,124"    fill="#0e1d07"/>
    <polygon points="58,92 18,158 98,158"    fill="#0f1c08"/>
    <polygon points="58,118 10,196 106,196"  fill="#0d1a07"/>
    <rect x="54" y="194" width="8" height="236" fill="#0c1906"/>

    <!-- RIGHT TREE (mirror at x=282) -->
    <polygon points="282,14 262,56 302,56"     fill="#0f1c08"/>
    <polygon points="282,40 256,90 308,90"      fill="#112008"/>
    <polygon points="282,66 249,124 315,124"    fill="#0e1d07"/>
    <polygon points="282,92 242,158 322,158"    fill="#0f1c08"/>
    <polygon points="282,118 234,196 330,196"   fill="#0d1a07"/>
    <rect x="278" y="194" width="8" height="236" fill="#0c1906"/>

    <!-- PATH (trapezoid converging toward vanishing point) -->
    <!-- At y=212: left edge ~106, right edge ~234 -->
    <!-- Vanishing at (170, 370) -->
    <polygon points="106,212 234,212 192,370 148,370" fill="#142607" opacity="0.6"/>

    <!-- Path border lines (gold, faint) -->
    <line x1="106" y1="212" x2="148" y2="370" stroke="#D4A853" stroke-width="0.8" opacity="0.22"/>
    <line x1="234" y1="212" x2="192" y2="370" stroke="#D4A853" stroke-width="0.8" opacity="0.22"/>

    <!-- Cross-marks on path (like trail markers) -->
    <line x1="125" y1="260" x2="215" y2="260" stroke="#D4A853" stroke-width="0.5" opacity="0.12"/>
    <line x1="136" y1="300" x2="204" y2="300" stroke="#D4A853" stroke-width="0.5" opacity="0.10"/>
    <line x1="143" y1="335" x2="197" y2="335" stroke="#D4A853" stroke-width="0.5" opacity="0.08"/>

    <!-- Horizon warm glow -->
    <ellipse cx="170" cy="358" rx="28" ry="14" fill="url(#horizglow)"/>
    <ellipse cx="170" cy="364" rx="10" ry="5"  fill="#D4A853" opacity="0.35"/>
    <circle  cx="170" cy="367" r="2.5"           fill="#FFF9E8" opacity="0.8"/>

    <!-- TEXT centered in arch gap -->
    <!-- At y=135: gap is left=91, right=249 → 158px wide. Text safe zone. -->
    <text x="170" y="130"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="24" font-weight="700" letter-spacing="5"
      fill="#FDFAF5">SHABBOS</text>

    <!-- Thin gold line -->
    <line x1="112" y1="143" x2="228" y2="143" stroke="#D4A853" stroke-width="0.6" opacity="0.4"/>

    <text x="170" y="165"
      text-anchor="middle"
      font-family="Georgia, 'Times New Roman', serif"
      font-size="11" font-weight="400" letter-spacing="9"
      fill="rgba(253,250,245,0.5)">VILLAGE</text>

  </svg>
</div>

</body>
</html>
